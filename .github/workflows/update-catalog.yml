name: STAC Katalog aktualisieren

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  # ── Job 1: Katalog generieren und committen ──────────────────────
  update:
    name: Katalog generieren
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: docs/ Ordner leeren
        run: find docs/ -mindepth 1 ! -name '.gitkeep' ! -name '.nojekyll' -delete

      - name: STAC Katalog generieren
        run: python scripts/generate_stac.py

      - name: Katalog committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/
          git diff --staged --quiet || git commit -m "chore: STAC Katalog aktualisiert $(date -u +%Y-%m-%d)"
          git push

  # ── Job 2: GitHub Pages deployen ─────────────────────────────────
  deploy:
    name: GitHub Pages deployen
    needs: update        # läuft erst nachdem Job 1 fertig ist
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Repository auschecken (nach Commit)
        uses: actions/checkout@v4
        with:
          ref: main      # wichtig: den aktuellen Stand nach dem Commit holen

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: docs/ Ordner hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
